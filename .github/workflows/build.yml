name: Build WizNote Exporter

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Create private key file
      shell: pwsh
      run: |
        "${{ secrets.PRIVATE_KEY }}" | Out-File -Encoding UTF8 private_key.txt

    - name: Build Windows executable
      run: |
        pyinstaller --onefile --name "WizNote导出工具" --add-data "private_key.txt;." wiz_export.py

    - name: Create release package
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path release/WizNote导出工具-Windows
        Copy-Item dist/WizNote导出工具.exe release/WizNote导出工具-Windows/
        @"
        WizNote 为知笔记导出工具 - Windows 版本
        ===============================================

        【系统要求】
        - Windows 10/11 64位
        - 无需安装 Python，已打包为独立应用

        【查看 WizNote 数据存储路径】
        1. 打开 为知笔记客户端 并登录账号
        2. 按快捷键 F10 或点击右上角 "菜单" 按钮
        3. 选择 "选项"
        4. 在左侧功能分类中点击 "数据存储"
        5. 此处会显示当前 本地数据存储位置

        【使用方法】
        1. 双击运行 WizNote导出工具.exe
        2. 输入 WizNote 数据目录（从上面步骤获取）
        3. 输入 WizNote 用户名（邮箱）
        4. 输入要导出的目录路径

        【导出路径示例】
        - /           - 导出全部笔记
        - /My Journals - 只导出日记
        - /工作/项目   - 只导出特定目录

        【输出文件】
        导出完成后会在当前目录生成 wiz/ 目录（Markdown文件）
        和 wiz/media/ 目录（图片附件）

        【导入 Obsidian】
        1. 打开 Obsidian
        2. 将 wiz/ 文件夹复制到 Obsidian 仓库
        3. 图片会自动显示

        【注意事项】
        - 如果杀毒软件提示风险，请添加到白名单
        "@ | Out-File -Encoding UTF8 release/WizNote导出工具-Windows/使用说明.txt
        Compress-Archive -Path release/WizNote导出工具-Windows/* -DestinationPath release/WizNote导出工具-Windows.zip

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: WizNote导出工具-Windows
        path: release/WizNote导出工具-Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Create private key file
      run: |
        echo "${{ secrets.PRIVATE_KEY }}" > private_key.txt

    - name: Build macOS executable (Universal2)
      run: |
        pyinstaller --onefile --name "WizNote导出工具" --target-arch universal2 --add-data "private_key.txt:." wiz_export.py

    - name: Create release package
      run: |
        mkdir -p release/WizNote导出工具-macOS
        cp dist/WizNote导出工具 release/WizNote导出工具-macOS/
        cat > release/WizNote导出工具-macOS/启动.command << 'EOF'
        #!/bin/bash
        cd "$(dirname "$0")"
        ./WizNote导出工具
        read -p "按回车键退出..."
        EOF
        chmod +x release/WizNote导出工具-macOS/启动.command
        # 使用 tar 保留权限，然后再 zip 以便用户解压方便
        cd release/WizNote导出工具-macOS && tar -czf ../WizNote导出工具-macOS.tar.gz . && cd ..
        # 同时创建 zip（兼容性）
        zip -r WizNote导出工具-macOS.zip WizNote导出工具-macOS/

    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: WizNote导出工具-macOS
        path: |
          release/WizNote导出工具-macOS.zip
          release/WizNote导出工具-macOS.tar.gz
